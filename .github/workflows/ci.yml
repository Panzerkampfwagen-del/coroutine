name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev clang-format clang-tidy cppcheck

      - name: Build (library, examples, echo_server, microdb, proxy)
        run: make

      - name: Run tests
        run: make check

      - name: Sanitizer build (ASan + UBSan) and tests
        run: |
          make debug
          export ASAN_OPTIONS=detect_leaks=1:abort_on_error=1
          export UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1
          ./hello >/dev/null
          ./pingpong
          ./stress 5
          ./channel_fuzz 20000
          ./sched_fuzz 20000

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev clang-format clang-tidy cppcheck

      - name: clang-format
        run: make format-check

      - name: clang-tidy
        run: make tidy

      - name: cppcheck
        run: make cppcheck

  cross-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user-static

      - name: Build + run the runtime on aarch64 under qemu
        run: make aarch64-check

  distributed:
    # microdb and the proxy are the only things that exercise io_uring at
    # *runtime*. GitHub runners increasingly gate io_uring via the
    # kernel.io_uring_disabled sysctl, so we try to re-enable it, probe whether
    # it actually works, and skip the test (with a warning) if the runner
    # genuinely forbids it - an environment limitation should not fail the build.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev

      - name: Run the distributed test (skipped if io_uring is unavailable)
        run: |
          # Best-effort: lift the gate if the runner set it, then show its state.
          sudo sysctl -w kernel.io_uring_disabled=0 2>/dev/null || true
          sysctl kernel.io_uring_disabled 2>/dev/null || echo "(no io_uring sysctl gate)"
          # Probe io_uring for real before relying on it.
          cc tests/io_uring_probe.c -o /tmp/iou_probe -luring
          if /tmp/iou_probe; then
            echo "io_uring available -> running the end-to-end distributed test"
            make dist-check
          else
            echo "::warning title=distributed test skipped::io_uring is disabled on this runner (kernel.io_uring_disabled); skipped the microdb/proxy end-to-end test."
          fi
